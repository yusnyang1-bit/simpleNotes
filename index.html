<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SimpleNotes v1.6 - Productivity</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --bg: #0f172a; --header: #1e293b; --text: #f8fafc;
            --accent: #6366f1; --border: #334155;
        }
        :root.light {
            --bg: #f8fafc; --header: #ffffff; --text: #0f172a;
            --accent: #3b82f6; --border: #e2e8f0;
        }

        body { background-color: var(--bg); color: var(--text); font-family: system-ui, -apple-system, sans-serif; transition: all 0.3s; }
        header { background-color: var(--header); border-bottom: 2px solid var(--accent); }
        
        /* 滾動條隱藏 */
        ::-webkit-scrollbar { display: none; }
        
        /* 動態顏色類別 */
        .tab-note { --tab-color: #3b82f6; }
        .tab-sheet { --tab-color: #10b981; }
        .tab-todo { --tab-color: #f59e0b; }
        .tab-list { --tab-color: #ec4899; }

        .active-tab { 
            border-bottom: 4px solid var(--tab-color) !important;
            color: var(--tab-color) !important;
            background: linear-gradient(to top, rgba(var(--tab-color), 0.1), transparent);
        }

        .table-wrapper { overflow-x: auto; -webkit-overflow-scrolling: touch; }
        table { border-collapse: collapse; min-width: 100%; }
        td { border: 1px solid var(--border); }
        td input { width: 100%; padding: 12px 8px; background: transparent; color: inherit; border: none; outline: none; }

        .todo-item.completed span { text-decoration: line-through; opacity: 0.5; }
        .btn-vibrant:active { transform: scale(0.9); }
    </style>
</head>
<body class="h-screen flex flex-col overflow-hidden">

<header class="p-3 shadow-xl z-20 flex flex-col gap-3">
    <div class="flex justify-between items-center">
        <div class="flex items-center gap-2">
            <div class="bg-indigo-600 p-1.5 rounded-lg shadow-lg">
                <i data-lucide="notebook" class="w-5 h-5 text-white"></i>
            </div>
            <span class="text-xs font-black tracking-tighter uppercase opacity-80">SimpleNotes v1.6</span>
        </div>
        <div class="flex items-center gap-2">
            <button onclick="toggleTheme()" class="p-2.5 rounded-xl bg-gray-100 dark:bg-gray-800 text-amber-500 btn-vibrant shadow-sm">
                <i data-lucide="sparkles" class="w-5 h-5"></i>
            </button>
            <button onclick="exportData()" class="p-2.5 rounded-xl bg-gray-100 dark:bg-gray-800 text-green-500 btn-vibrant shadow-sm" title="一鍵匯出">
                <i data-lucide="download" class="w-5 h-5"></i>
            </button>
            <button onclick="saveData()" class="bg-gradient-to-r from-indigo-500 to-purple-600 text-white p-2.5 rounded-xl shadow-lg btn-vibrant">
                <i data-lucide="save" class="w-5 h-5"></i>
            </button>
        </div>
    </div>

    <div class="flex gap-2">
        <button onclick="addTab('note')" class="flex-1 bg-white dark:bg-gray-800 p-3 rounded-xl shadow-sm border border-gray-100 dark:border-gray-700 flex justify-center btn-vibrant">
            <i data-lucide="file-text" class="w-6 h-6 text-blue-500"></i>
        </button>
        <button onclick="addTab('sheet')" class="flex-1 bg-white dark:bg-gray-800 p-3 rounded-xl shadow-sm border border-gray-100 dark:border-gray-700 flex justify-center btn-vibrant">
            <i data-lucide="grid-3x3" class="w-6 h-6 text-emerald-500"></i>
        </button>
        <button onclick="addTab('todo')" class="flex-1 bg-white dark:bg-gray-800 p-3 rounded-xl shadow-sm border border-gray-100 dark:border-gray-700 flex justify-center btn-vibrant">
            <i data-lucide="check-circle" class="w-6 h-6 text-amber-500"></i>
        </button>
        <button onclick="addTab('list')" class="flex-1 bg-white dark:bg-gray-800 p-3 rounded-xl shadow-sm border border-gray-100 dark:border-gray-700 flex justify-center btn-vibrant">
            <i data-lucide="list" class="w-6 h-6 text-pink-500"></i>
        </button>
    </div>
</header>

<div id="tab-bar" class="flex px-2 border-b border-gray-200 dark:border-gray-800 overflow-x-auto whitespace-nowrap bg-opacity-20"></div>

<main id="editor-container" class="flex-1 p-3 overflow-hidden"></main>

<script>
    let tabs = JSON.parse(localStorage.getItem('roberts_v16_data')) || [
        { id: '1', title: '記事', type: 'note', content: '' },
        { id: '2', title: '待辦', type: 'todo', content: [{text: '歡迎使用待辦功能', completed: false}] }
    ];
    let activeTabId = tabs.length > 0 ? tabs[0].id : null;
    let currentTheme = localStorage.getItem('sn_theme') || 'dark';

    function init() {
        if (currentTheme === 'light') document.documentElement.classList.add('light');
        render();
    }

    function render() {
        renderTabs();
        renderEditor();
        lucide.createIcons();
    }

    function renderTabs() {
        const tabBar = document.getElementById('tab-bar');
        tabBar.innerHTML = tabs.map(tab => `
            <div class="group flex items-center px-4 py-3 cursor-pointer transition-all tab-${tab.type} ${activeTabId === tab.id ? 'active-tab' : 'text-gray-400 opacity-60'}" onclick="switchTab('${tab.id}')">
                <span class="text-xs font-bold" ondblclick="renameTab('${tab.id}')">${tab.title}</span>
                <i data-lucide="x" onclick="deleteTab(event, '${tab.id}')" class="w-3 h-3 ml-2 opacity-0 group-hover:opacity-100 hover:text-red-500 transition"></i>
            </div>
        `).join('');
    }

    function renderEditor() {
        const container = document.getElementById('editor-container');
        const activeTab = tabs.find(t => t.id === activeTabId);
        if (!activeTab) return container.innerHTML = "";

        if (activeTab.type === 'note' || activeTab.type === 'list') {
            container.innerHTML = `<textarea oninput="updateContent(this.value)" class="w-full h-full p-5 rounded-2xl bg-gray-50 dark:bg-gray-800/40 shadow-inner outline-none text-base" placeholder="在此輸入...">${activeTab.content}</textarea>`;
        } else if (activeTab.type === 'sheet') {
            let tableHtml = `<div class="h-full bg-gray-50 dark:bg-gray-800/40 rounded-2xl border border-gray-200 dark:border-gray-700 overflow-hidden flex flex-col shadow-inner">
                <div class="p-2 border-b border-gray-200 dark:border-gray-700 flex gap-2">
                    <button onclick="addRow()" class="p-1.5 bg-emerald-500/10 text-emerald-500 rounded-lg"><i data-lucide="plus" class="w-4 h-4"></i></button>
                    <button onclick="addCol()" class="p-1.5 bg-emerald-500/10 text-emerald-500 rounded-lg"><i data-lucide="more-horizontal" class="w-4 h-4"></i></button>
                </div>
                <div class="table-wrapper flex-1"><table><tbody>${activeTab.content.map((row, rIdx) => `<tr>${row.map((cell, cIdx) => `<td><input value="${cell}" oninput="updateSheet(${rIdx}, ${cIdx}, this.value)"></td>`).join('')}</tr>`).join('')}</tbody></table></div></div>`;
            container.innerHTML = tableHtml;
        } else if (activeTab.type === 'todo') {
            let todoHtml = `<div class="h-full flex flex-col gap-3">
                <div class="flex gap-2">
                    <input type="text" id="todo-input" class="flex-1 p-3 rounded-xl bg-gray-50 dark:bg-gray-800/40 border border-gray-200 dark:border-gray-700 outline-none" placeholder="新增待辦事項..." onkeypress="if(event.key==='Enter') addTodo()">
                    <button onclick="addTodo()" class="bg-amber-500 text-white p-3 rounded-xl shadow-lg btn-vibrant"><i data-lucide="plus" class="w-6 h-6"></i></button>
                </div>
                <div class="flex-1 overflow-y-auto space-y-2 pr-1">
                    ${activeTab.content.map((item, idx) => `
                        <div class="todo-item ${item.completed ? 'completed' : ''} flex items-center gap-3 p-4 bg-white dark:bg-gray-800/40 rounded-xl border border-gray-100 dark:border-gray-700 shadow-sm">
                            <input type="checkbox" class="w-5 h-5 accent-amber-500" ${item.completed ? 'checked' : ''} onchange="toggleTodo(${idx})">
                            <span class="flex-1 text-sm">${item.text}</span>
                            <button onclick="removeTodo(${idx})" class="text-red-400 opacity-0 group-hover:opacity-100"><i data-lucide="trash-2" class="w-4 h-4"></i></button>
                        </div>
                    `).join('')}
                </div>
            </div>`;
            container.innerHTML = todoHtml;
        }
    }

    // --- 功能邏輯 ---
    function addTab(type) {
        const id = Date.now().toString();
        const titles = { note: '記事', sheet: '表格', todo: '待辦', list: '項目' };
        const content = type === 'sheet' ? [['', ''], ['', '']] : (type === 'todo' ? [] : '');
        tabs.push({ id, title: titles[type], type, content });
        activeTabId = id;
        render();
    }

    // Todo 特有功能
    function addTodo() {
        const input = document.getElementById('todo-input');
        if (!input.value.trim()) return;
        const activeTab = tabs.find(t => t.id === activeTabId);
        activeTab.content.push({ text: input.value, completed: false });
        input.value = '';
        render();
    }
    function toggleTodo(idx) {
        const activeTab = tabs.find(t => t.id === activeTabId);
        activeTab.content[idx].completed = !activeTab.content[idx].completed;
        render();
    }
    function removeTodo(idx) {
        const activeTab = tabs.find(t => t.id === activeTabId);
        activeTab.content.splice(idx, 1);
        render();
    }

    function switchTab(id) { activeTabId = id; render(); }
    function renameTab(id) {
        const tab = tabs.find(t => t.id === id);
        const newTitle = prompt('重新命名分頁：', tab.title);
        if (newTitle) { tab.title = newTitle; render(); }
    }
    function deleteTab(e, id) {
        e.stopPropagation();
        if (confirm('確定刪除？')) {
            tabs = tabs.filter(t => t.id !== id);
            if (activeTabId === id) activeTabId = tabs.length > 0 ? tabs[0].id : null;
            render();
        }
    }
    function updateContent(val) { tabs.find(t => t.id === activeTabId).content = val; }
    function updateSheet(r, c, val) { tabs.find(t => t.id === activeTabId).content[r][c] = val; }
    function addRow() { const t = tabs.find(t => t.id === activeTabId); t.content.push(new Array(t.content[0].length).fill('')); render(); }
    function addCol() { tabs.find(t => t.id === activeTabId).content.forEach(r => r.push('')); render(); }

    function toggleTheme() {
        currentTheme = currentTheme === 'dark' ? 'light' : 'dark';
        document.documentElement.classList.toggle('light');
        localStorage.setItem('sn_theme', currentTheme);
    }

    function saveData() {
        localStorage.setItem('roberts_v16_data', JSON.stringify(tabs));
        alert('💾 已儲存至本地');
    }

    function exportData() {
        const dataStr = JSON.stringify(tabs, null, 2);
        const blob = new Blob([dataStr], { type: 'application/json' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `SimpleNotes_Backup_${new Date().toISOString().slice(0,10)}.json`;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
    }

    init();
</script>
</body>
</html>
