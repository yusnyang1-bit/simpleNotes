<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SimpleNotes v1.5.2</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --bg: #0f172a; --header: #1e293b; --text: #f8fafc;
            --accent: #6366f1; --border: #334155; --input-bg: #1e293b;
        }
        :root.light {
            --bg: #f0f9ff; --header: #ffffff; --text: #0f172a;
            --accent: #0ea5e9; --border: #e2e8f0; --input-bg: #ffffff;
        }

        body { background-color: var(--bg); color: var(--text); font-family: sans-serif; transition: all 0.3s ease; }
        header { background-color: var(--header); border-bottom: 2px solid var(--accent); }
        
        /* 滾動條隱藏 */
        ::-webkit-scrollbar { display: none; }
        
        /* 表格優化 */
        .table-wrapper { overflow-x: auto; -webkit-overflow-scrolling: touch; }
        table { border-collapse: collapse; min-width: 100%; table-layout: fixed; }
        td { border: 1px solid var(--border); min-width: 80px; }
        td input { width: 100%; padding: 12px 8px; background: transparent; color: inherit; border: none; outline: none; }

        /* 標籤樣式 */
        .active-tab { 
            background: linear-gradient(to top, rgba(99, 102, 241, 0.2), transparent);
            border-bottom: 4px solid var(--accent); 
            color: var(--accent);
        }
        .btn-vibrant { transition: all 0.2s; }
        .btn-vibrant:active { transform: scale(0.9); }
    </style>
</head>
<body class="h-screen flex flex-col overflow-hidden">

<header class="p-3 shadow-xl z-20 flex flex-col gap-3">
    <div class="flex justify-between items-center">
        <div class="flex items-center gap-2">
            <div class="bg-indigo-500 p-1.5 rounded-lg shadow-lg">
                <i data-lucide="notebook" class="w-5 h-5 text-white"></i>
            </div>
            <div class="flex flex-col">
                <span class="text-[10px] font-black text-indigo-400 tracking-tighter uppercase">SimpleNotes</span>
                <span class="text-[8px] opacity-50 font-mono mt-[-2px]">PRO v1.5.2</span>
            </div>
        </div>
        <div class="flex items-center gap-2">
            <button onclick="toggleTheme()" class="p-2.5 rounded-xl bg-gray-100 dark:bg-gray-800 text-amber-500 btn-vibrant shadow-sm">
                <i data-lucide="sparkles" class="w-5 h-5"></i>
            </button>
            <button onclick="saveData()" class="bg-gradient-to-r from-indigo-500 to-purple-600 text-white p-2.5 rounded-xl shadow-lg btn-vibrant">
                <i data-lucide="save" class="w-5 h-5"></i>
            </button>
        </div>
    </div>

    <div class="flex gap-2">
        <button onclick="addTab('note')" class="flex-1 bg-white dark:bg-gray-800 p-3 rounded-xl shadow-sm border border-gray-100 dark:border-gray-700 flex justify-center btn-vibrant">
            <i data-lucide="file-text" class="w-6 h-6 text-blue-500"></i>
        </button>
        <button onclick="addTab('sheet')" class="flex-1 bg-white dark:bg-gray-800 p-3 rounded-xl shadow-sm border border-gray-100 dark:border-gray-700 flex justify-center btn-vibrant">
            <i data-lucide="grid-3x3" class="w-6 h-6 text-emerald-500"></i>
        </button>
        <button onclick="addTab('todo')" class="flex-1 bg-white dark:bg-gray-800 p-3 rounded-xl shadow-sm border border-gray-100 dark:border-gray-700 flex justify-center btn-vibrant">
            <i data-lucide="check-square" class="w-6 h-6 text-orange-500"></i>
        </button>
        <button onclick="addTab('list')" class="flex-1 bg-white dark:bg-gray-800 p-3 rounded-xl shadow-sm border border-gray-100 dark:border-gray-700 flex justify-center btn-vibrant">
            <i data-lucide="list" class="w-6 h-6 text-pink-500"></i>
        </button>
    </div>
</header>

<div id="tab-bar" class="flex px-2 border-b border-gray-200 dark:border-gray-800 overflow-x-auto whitespace-nowrap bg-opacity-20">
</div>

<main id="editor-container" class="flex-1 p-3 overflow-hidden">
</main>

<script>
    let tabs = JSON.parse(localStorage.getItem('roberts_v152_data')) || [
        { id: '1', title: '記事', type: 'note', content: '' },
        { id: '2', title: '表格', type: 'sheet', content: [['', ''], ['', '']] }
    ];
    let activeTabId = tabs.length > 0 ? tabs[0].id : null;
    let currentTheme = localStorage.getItem('sn_theme') || 'dark';

    function init() {
        if (currentTheme === 'light') document.documentElement.classList.add('light');
        render();
    }

    function render() {
        const tabBar = document.getElementById('tab-bar');
        tabBar.innerHTML = tabs.map(tab => `
            <div class="group flex items-center px-4 py-3 cursor-pointer transition-all ${activeTabId === tab.id ? 'active-tab' : 'text-gray-400'}" onclick="switchTab('${tab.id}')">
                <span class="text-xs font-medium" ondblclick="renameTab('${tab.id}')">${tab.title}</span>
                <i data-lucide="x" onclick="deleteTab(event, '${tab.id}')" class="w-3 h-3 ml-2 opacity-0 group-hover:opacity-100 hover:text-red-500 transition"></i>
            </div>
        `).join('');

        const container = document.getElementById('editor-container');
        const activeTab = tabs.find(t => t.id === activeTabId);
        
        if (!activeTab) {
            container.innerHTML = `<div class="h-full flex flex-col items-center justify-center opacity-20"><i data-lucide="layout" class="w-16 h-16"></i></div>`;
        } else if (activeTab.type === 'note' || activeTab.type === 'todo' || activeTab.type === 'list') {
            const placeholder = activeTab.type === 'todo' ? '每行一項待辦...' : activeTab.type === 'list' ? '每行一個項目...' : '開始寫作...';
            container.innerHTML = `<textarea oninput="updateContent(this.value)" class="w-full h-full p-5 rounded-2xl bg-gray-50 dark:bg-gray-800/40 shadow-inner outline-none text-base leading-relaxed" placeholder="${placeholder}">${activeTab.content}</textarea>`;
        } else if (activeTab.type === 'sheet') {
            let tableHtml = `<div class="h-full bg-gray-50 dark:bg-gray-800/40 rounded-2xl border border-gray-200 dark:border-gray-700 overflow-hidden flex flex-col shadow-inner">
                <div class="p-2 border-b border-gray-200 dark:border-gray-700 flex gap-2">
                    <button onclick="addRow()" class="p-1.5 bg-indigo-500/10 text-indigo-500 rounded-lg"><i data-lucide="plus" class="w-4 h-4"></i></button>
                    <button onclick="addCol()" class="p-1.5 bg-emerald-500/10 text-emerald-500 rounded-lg"><i data-lucide="more-horizontal" class="w-4 h-4"></i></button>
                </div>
                <div class="table-wrapper flex-1"><table><tbody>`;
            activeTab.content.forEach((row, rIdx) => {
                tableHtml += `<tr>${row.map((cell, cIdx) => `<td><input value="${cell}" oninput="updateSheet(${rIdx}, ${cIdx}, this.value)"></td>`).join('')}</tr>`;
            });
            tableHtml += `</tbody></table></div></div>`;
            container.innerHTML = tableHtml;
        }
        lucide.createIcons();
    }

    // --- 核心功能 ---
    function addTab(type) {
        const id = Date.now().toString();
        const titles = { note: '記事', sheet: '表格', todo: '待辦', list: '項目' };
        tabs.push({ id, title: titles[type], type, content: type === 'sheet' ? [['', ''], ['', '']] : '' });
        activeTabId = id;
        render();
    }

    function switchTab(id) { activeTabId = id; render(); }
    function renameTab(id) {
        const tab = tabs.find(t => t.id === id);
        const newTitle = prompt('重新命名分頁：', tab.title);
        if (newTitle) { tab.title = newTitle; render(); }
    }
    function deleteTab(e, id) {
        e.stopPropagation();
        if (confirm('確定刪除？')) {
            tabs = tabs.filter(t => t.id !== id);
            if (activeTabId === id) activeTabId = tabs.length > 0 ? tabs[0].id : null;
            render();
        }
    }
    function updateContent(val) { tabs.find(t => t.id === activeTabId).content = val; }
    function updateSheet(r, c, val) { tabs.find(t => t.id === activeTabId).content[r][c] = val; }
    function addRow() { 
        const tab = tabs.find(t => t.id === activeTabId);
        tab.content.push(new Array(tab.content[0].length).fill(''));
        render();
    }
    function addCol() {
        const tab = tabs.find(t => t.id === activeTabId);
        tab.content.forEach(row => row.push(''));
        render();
    }
    function toggleTheme() {
        currentTheme = currentTheme === 'dark' ? 'light' : 'dark';
        document.documentElement.classList.toggle('light');
        localStorage.setItem('sn_theme', currentTheme);
    }
    function saveData() {
        localStorage.setItem('roberts_v152_data', JSON.stringify(tabs));
        alert('✅ 儲存成功');
    }

    init();
</script>
</body>
</html>
